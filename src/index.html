<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMZZ HOSTING — API Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --surface2: #111111;
            --surface3: #1a1a1a;
            --border: #1f1f1f;
            --border-hover: #2a2a2a;
            --gold: #f59e0b;
            --gold-dim: #b45309;
            --text: #fafafa;
            --text2: #a1a1aa;
            --text3: #71717a;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Grid Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ HEADER ============ */
        .header {
            text-align: center;
            padding: 60px 0 30px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.4rem;
            color: #000;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .header h1 .gold {
            color: var(--gold);
        }

        .typing-wrap {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text3);
            font-size: 0.9rem;
            font-weight: 400;
        }

        #typingText {
            color: var(--gold);
            font-weight: 500;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: var(--gold);
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.15);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: var(--gold);
            margin-top: 12px;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
            50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
        }

        /* ============ STATS ============ */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(245,158,11,0.25);
            transform: translateY(-2px);
        }

        .stat-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; }
        .stat-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

        /* ============ SEARCH ============ */
        .search-wrap {
            margin-bottom: 20px;
        }

        .search-wrap input {
            width: 100%;
            padding: 12px 18px;
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            border-color: rgba(245,158,11,0.35);
            box-shadow: 0 0 20px rgba(245,158,11,0.04);
        }

        .search-wrap input::placeholder {
            color: var(--text3);
        }

        /* ============ LOADER ============ */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loader.active { display: block; }
        .loader .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============ CATEGORY ============ */
        .category {
            margin-bottom: 10px;
        }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .cat-header:hover {
            border-color: var(--border-hover);
            background: var(--surface3);
        }

        .cat-header.open {
            border-color: rgba(245,158,11,0.25);
            border-radius: 12px 12px 0 0;
        }

        .cat-icon { font-size: 1.2rem; flex-shrink: 0; }
        .cat-name { font-weight: 600; flex: 1; font-size: 0.9rem; }
        .cat-count {
            background: rgba(245,158,11,0.1);
            color: var(--gold);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .cat-arrow {
            font-size: 0.65rem;
            color: var(--text3);
            transition: transform 0.3s;
        }
        .cat-header.open .cat-arrow {
            transform: rotate(180deg);
        }

        .cat-body {
            display: none;
            border: 1px solid rgba(245,158,11,0.15);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        .cat-body.open { display: block; }

        /* ============ ENDPOINT CARD ============ */
        .endpoint {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            transition: all 0.25s;
        }

        .endpoint:last-child { border-bottom: none; }

        .endpoint:hover {
            background: var(--surface2);
            box-shadow: inset 3px 0 0 var(--gold);
        }

        .ep-method {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .method-get { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
        .method-post { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }

        .ep-info { flex: 1; min-width: 0; }
        .ep-name { font-size: 0.85rem; font-weight: 600; }
        .ep-path {
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 0.72rem;
            color: var(--text3);
            word-break: break-all;
            margin-top: 1px;
        }

        .ep-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .btn {
            padding: 7px 12px;
            border-radius: 7px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .btn-test {
            background: var(--gold);
            color: #000;
            border: none;
            font-weight: 700;
        }

        .btn-test:hover {
            background: #e5900a;
            color: #000;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modal-title { font-weight: 700; font-size: 1rem; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 1.3rem;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--red); }

        .modal input {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin-bottom: 6px;
            outline: none;
            font-size: 0.85rem;
        }
        .modal input:focus { border-color: var(--gold); }

        .response-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            font-family: 'SF Mono', monospace;
            font-size: 0.72rem;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: var(--green);
        }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #18181b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ============ FOOTER ============ */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text3);
            font-size: 0.72rem;
        }
        .footer a { color: var(--gold); text-decoration: none; font-weight: 600; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 640px) {
            .header { padding: 40px 0 20px; }
            .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card { padding: 12px; }
            .stat-value { font-size: 1.2rem; }
            .endpoint { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
            .ep-actions { width: 100%; justify-content: flex-end; }
            .ep-path { font-size: 0.68rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="logo">R</div>
            <h1>RAMZZ <span class="gold">HOSTING</span></h1>
            <div class="typing-wrap">
                <span id="typingText"></span><span class="cursor"></span>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span> API Operational
            </div>
        </header>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="totalEp">-</div>
                <div class="stat-label">Endpoints</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalCat">-</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-value">Online</div>
                <div class="stat-label" id="apiVer">v2.0</div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-wrap">
            <input type="text" id="search" placeholder="🔍 Search endpoints..." oninput="filterEndpoints()">
        </div>

        <!-- LOADER -->
        <div class="loader" id="loader"><div class="spinner"></div></div>

        <!-- ENDPOINTS -->
        <div id="container"></div>

        <!-- FOOTER -->
        <footer class="footer">
            © 2024 <a href="#">RAMZZ HOSTING</a> — API Dashboard
        </footer>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">🧪 API Tester</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalParams"></div>
            <button class="btn btn-test" style="width:100%;padding:10px;margin-top:6px;" onclick="executeTest()">
                ⚡ Execute
            </button>
            <div class="response-box" id="modalResponse">// Response here...</div>
        </div>
    </div>

    <script>
        // ============ TYPING EFFECT ============
        const phrases = [
            'Payment Gateway API',
            'QRIS Auto Generator',
            'Order Management System',
            'Webhook Ready',
            'REST API v2.0'
        ];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typingEl = document.getElementById('typingText');

        function typeEffect() {
            const current = phrases[phraseIndex];
            if (isDeleting) {
                typingEl.textContent = current.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingEl.textContent = current.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === current.length) {
                setTimeout(() => isDeleting = true, 1500);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
            }

            const speed = isDeleting ? 40 : 80;
            setTimeout(typeEffect, speed);
        }
        typeEffect();

        // ============ DATA ============
        let allData = {};
        let currentPath = '';
        let currentMethod = 'GET';

        const catIcons = {
            'Order': '📦', 'Payment': '💳', 'Webhook': '🔗',
            'Notification': '📧', 'Auth': '🔐', 'Downloader': '⬇️',
            'Search': '🔍', 'Tools': '🛠️', 'Stalker': '👁️',
            'Cloudflare': '☁️', 'Openai': '🤖', 'Imagecreator': '🎨'
        };

        // ============ FETCH ============
        async function loadEndpoints() {
            document.getElementById('loader').classList.add('active');
            document.getElementById('container').innerHTML = '';

            try {
                const res = await fetch('/endpoints');
                const data = await res.json();
                allData = data.categories || data;

                document.getElementById('totalEp').textContent = data.total_endpoints || 0;
                document.getElementById('totalCat').textContent = data.total_categories || 0;
                if (data.version) document.getElementById('apiVer').textContent = data.version;

                render(allData);
            } catch (err) {
                document.getElementById('container').innerHTML = '<p style="text-align:center;color:var(--red);padding:40px;">⚠️ Failed to load endpoints</p>';
            } finally {
                document.getElementById('loader').classList.remove('active');
            }
        }

        // ============ RENDER ============
        function render(categories) {
            const container = document.getElementById('container');
            Object.keys(categories).sort().forEach((cat, idx) => {
                const eps = categories[cat];
                const icon = catIcons[cat] || '📋';

                const div = document.createElement('div');
                div.className = 'category';
                div.innerHTML = `
                    <div class="cat-header ${idx === 0 ? 'open' : ''}" onclick="toggleCat(this)">
                        <span class="cat-icon">${icon}</span>
                        <span class="cat-name">${cat}</span>
                        <span class="cat-count">${eps.length}</span>
                        <i class="fas fa-chevron-down cat-arrow"></i>
                    </div>
                    <div class="cat-body ${idx === 0 ? 'open' : ''}">
                        ${eps.map(ep => {
                            const method = ep.method || 'GET';
                            const mc = method === 'POST' ? 'method-post' : 'method-get';
                            return `
                                <div class="endpoint" data-cat="${cat.toLowerCase()}" data-name="${ep.name.toLowerCase()}">
                                    <span class="ep-method ${mc}">${method}</span>
                                    <div class="ep-info">
                                        <div class="ep-name">${ep.name}</div>
                                        <div class="ep-path">${escapeHtml(ep.path.split('?')[0])}</div>
                                    </div>
                                    <div class="ep-actions">
                                        <button class="btn" onclick="copyURL('${escapeHtml(ep.path.split('?')[0])}')">📋</button>
                                        <button class="btn btn-test" onclick="openModal('${escapeHtml(ep.path)}','${method}')">Test</button>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>`;
                container.appendChild(div);
            });
        }

        function toggleCat(header) {
            header.classList.toggle('open');
            header.nextElementSibling.classList.toggle('open');
        }

        // ============ SEARCH ============
        function filterEndpoints() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.endpoint').forEach(ep => {
                const name = ep.dataset.name || '';
                const path = ep.querySelector('.ep-path')?.textContent || '';
                ep.style.display = (!q || name.includes(q) || path.includes(q)) ? 'flex' : 'none';
            });
        }

        // ============ COPY ============
        function copyURL(path) {
            const full = window.location.origin + path;
            navigator.clipboard.writeText(full).then(() => showToast('📋 URL Copied!'));
        }

        // ============ MODAL ============
        function openModal(path, method) {
            currentPath = path;
            currentMethod = method;
            const [base, qs] = path.split('?');
            const params = qs ? qs.split('&') : [];

            let html = `<label style="font-size:0.72rem;color:var(--text3);">Endpoint</label>
                        <input value="${base}" readonly>`;
            params.forEach(p => {
                const [k] = p.split('=');
                html += `<div style="display:flex;gap:6px;">
                    <input value="${k}" readonly style="width:100px;flex-shrink:0;">
                    <input class="pv" data-key="${k}" placeholder="${k === 'apikey' ? 'YOUR_KEY' : k}">
                </div>`;
            });

            document.getElementById('modalParams').innerHTML = html;
            document.getElementById('modalResponse').textContent = '// Response here...';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function executeTest() {
            const base = currentPath.split('?')[0];
            const vals = document.querySelectorAll('.pv');
            let qp = [];
            vals.forEach(v => { if (v.value) qp.push(`${v.dataset.key}=${encodeURIComponent(v.value)}`); });
            const url = qp.length ? `${base}?${qp.join('&')}` : base;

            const box = document.getElementById('modalResponse');
            box.textContent = '⏳ Loading...';
            try {
                const res = await fetch(url, { method: currentMethod });
                const data = await res.json();
                box.textContent = JSON.stringify(data, null, 2);
                box.style.color = res.ok ? 'var(--green)' : 'var(--red)';
            } catch (e) {
                box.textContent = `❌ ${e.message}`;
                box.style.color = 'var(--red)';
            }
        }

        // ============ TOAST ============
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1800);
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });

        loadEndpoints();
    </script>
</body>
</html>
